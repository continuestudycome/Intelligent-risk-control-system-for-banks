server:
  port: 8080

spring:
  application:
    name: backend-service
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        enabled: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  datasource:
    url: jdbc:mysql://localhost:3306/trading?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password: 20041202
      database: 0
      timeout: 5000ms
      connect-timeout: 5000ms
      lettuce:
        pool:   # 连接池
          max-active: 10  # 最大连接数
          max-idle: 10    # 最大空闲数（最多可以创建的连接数）
          min-idle: 1     # 最小空闲数（超过一段时间一直没人连接，连接池就会被释放，直到1）
          time-between-eviction-runs: 10s

# 在原有配置基础上添加
risk:
  jwt:
    secret: your-256-bit-secret-key-here-must-be-at-least-32-characters-long
    access-token-expiration: 86400000    # 24小时
    refresh-token-expiration: 604800000  # 7天

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/*.xml

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# AI 服务配置
ai:
  service:
    url: http://localhost:8000
    name: ai-service
