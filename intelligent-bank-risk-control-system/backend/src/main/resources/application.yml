server:
  port: 8080

spring:
  application:
    name: backend-service
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        enabled: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  datasource:
    url: jdbc:mysql://localhost:3306/bank_risk_control?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  data:
    redis:
      host: localhost
      port: 6379
      password: 20041202
      database: 0
      timeout: 5000ms
      connect-timeout: 5000ms
      lettuce:
        pool:   # 连接池
          max-active: 10  # 最大连接数
          max-idle: 10    # 最大空闲数（最多可以创建的连接数）
          min-idle: 1     # 最小空闲数（超过一段时间一直没人连接，连接池就会被释放，直到1）
          time-between-eviction-runs: 10s

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

# 在原有配置基础上添加
risk:
  jwt:
    secret: your-256-bit-secret-key-here-must-be-at-least-32-characters-long
    access-token-expiration: 86400000    # 24小时
    refresh-token-expiration: 604800000  # 7天

# mybatis-plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/*.xml

# SpringDoc OpenAPI (Swagger) 配置
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha

# AI 服务配置
ai:
  service:
    url: http://localhost:8000
    name: ai-service

# 信用评分（ai_services 逻辑回归 / 失败时本地兜底）
credit:
  ml:
    timeout-ms: 8000
  limit:
    min-total: 10000
    max-total: 2000000
    # 调用 ai_services /credit/limit-recommend 的超时（毫秒），失败则 Java 本地规则兜底
    timeout-ms: 8000
    up-ratio: 0.02
    down-ratio: 0.02
    # 每日凌晨 2 点跑授信动态调整（下调自动、上调生成工单）
    adjust-cron: "0 0 2 * * ?"

# 实时反欺诈（规则引擎 + AI 孤立森林）
# score-high：规则已为 LOW 时，仅当孤立森林异常分≥该值才升为 HIGH（避免正常交易被误抬档）
# 智能客服 RAG（Java -> ai_services -> Ollama）
bot:
  rag:
    timeout-ms: 180000

fraud:
  ml:
    timeout-ms: 8000
    score-high: 0.68
  rule:
    remote-amount-min: 28000
    absolute-high-amount: 85000
    probe-max-amount: 500
    probe-count-medium: 4
