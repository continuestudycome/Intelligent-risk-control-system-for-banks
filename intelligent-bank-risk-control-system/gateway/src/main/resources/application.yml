server:
  port: 9000

spring:
  application:
    name: gateway

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        import-check:
          enabled: false

    gateway:
      routes:
        # /api/ai/** 必须排在 /api/** 之前，否则会走错后端
        - id: ai-service
          uri: lb://ai-service
          order: 0
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=2
            - AddResponseHeader=X-Gateway-Service, ai-service

        - id: backend-service
          uri: lb://backend-service
          order: 10
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1
            - AddResponseHeader=X-Gateway-Service, backend-service

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

      default-filters:
        - AddResponseHeader=X-Gateway-Timestamp, ${spring.application.name}

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.system.gateway: debug
    org.springframework.cloud.gateway: debug
